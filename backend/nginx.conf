server {
    listen 80;
    server_name elroperitotienda.com.ar www.elroperitotienda.com.ar;

    # Redirigir todo HTTP a HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name elroperitotienda.com.ar www.elroperitotienda.com.ar;

    # SSL — ajustar rutas al certificado real (Let's Encrypt recomendado)
    ssl_certificate     /etc/letsencrypt/live/elroperitotienda.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/elroperitotienda.com.ar/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 10M;

    # Archivos media (imágenes de productos subidas por el admin)
    location /media/ {
        alias /ruta/al/backend/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
    }

    # Archivos estáticos del frontend (CSS, JS, imágenes)
    location ~* \.(css|js|ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot)$ {
        root /ruta/al/frontend/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Frontend — páginas HTML
    location ~* \.html$ {
        root /ruta/al/frontend/;
        expires -1;
        add_header Cache-Control "no-store";
    }

    # Todo lo demás → Django (Gunicorn)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Seguridad — headers globales
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
