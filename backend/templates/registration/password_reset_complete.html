<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contraseña actualizada — El Roperito</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #fafaf8;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .brand {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 0.08em;
            color: #1a1a1a;
            text-decoration: none;
            margin-bottom: 8px;
        }
        .brand-tagline {
            font-family: 'Jost', sans-serif;
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 40px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
            padding: 48px 36px;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        .success-icon {
            width: 56px;
            height: 56px;
            background: #e8f5e9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .success-icon svg {
            width: 28px;
            height: 28px;
            color: #2e7d32;
        }
        .card-title {
            font-family: 'Jost', sans-serif;
            font-size: 22px;
            font-weight: 500;
            margin-bottom: 12px;
            color: #1a1a1a;
        }
        .card-desc {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 28px;
        }
        .login-link {
            display: inline-block;
            padding: 14px 36px;
            background: #1a1a1a;
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-family: 'Jost', sans-serif;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.04em;
            transition: background 0.2s;
        }
        .login-link:hover { background: #333; }
    </style>
</head>
<body>
    <a href="/" class="brand">El Roperito</a>
    <p class="brand-tagline">Moda circular infantil</p>

    <div class="card">
        <div class="success-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <h1 class="card-title">¡Contraseña actualizada!</h1>
        <p class="card-desc">Tu contraseña fue cambiada correctamente. Ya podés iniciar sesión con tu nueva contraseña.</p>
        <a href="/login/" class="login-link">Iniciar sesión</a>
    </div>
</body>
</html>
