<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <title>Pago en proceso — El Roperito</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        .payment-result-page {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 16px;
        }
        .payment-result-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 32px rgba(0,0,0,0.08);
            padding: 48px 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        .payment-result-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            background: rgba(255, 193, 7, 0.12);
        }
        .payment-result-icon svg { color: #d4a017; }
        .payment-result-title {
            font-family: 'Jost', sans-serif;
            font-size: 26px;
            font-weight: 500;
            color: #1a1a18;
            margin: 0 0 12px;
        }
        .payment-result-subtitle {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
            margin: 0 0 8px;
        }
        .payment-result-detail {
            font-size: 13px;
            color: #999;
            margin: 0 0 32px;
            line-height: 1.6;
        }
        .payment-result-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn-primary-result {
            display: block;
            padding: 14px 24px;
            background: #1a1a18;
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-family: 'Jost', sans-serif;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: background 0.2s;
        }
        .btn-primary-result:hover { background: #333; }
        .btn-secondary-result {
            display: block;
            padding: 14px 24px;
            background: transparent;
            color: #1a1a18;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            text-decoration: none;
            font-family: 'Jost', sans-serif;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .btn-secondary-result:hover { border-color: #1a1a18; }
    </style>
</head>
<body class="page-body">

    <div id="site-header"></div>

    <main class="payment-result-page">
        <div class="payment-result-card">
            <div class="payment-result-icon">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
            </div>
            <h1 class="payment-result-title">Pago en proceso</h1>
            <p class="payment-result-subtitle">Tu pago está siendo revisado por MercadoPago.</p>
            <p class="payment-result-detail">
                Esto puede tardar algunas horas. Te notificaremos cuando se confirme.<br>
                Tu orden quedará reservada durante este tiempo.
            </p>
            <div class="payment-result-actions">
                <a href="/perfil/" class="btn-primary-result">Ver estado de mis órdenes</a>
                <a href="/tienda/" class="btn-secondary-result">Volver a la tienda</a>
            </div>
        </div>
    </main>

    <script src="js/components.js"></script>
    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const ordenId = params.get('external_reference');
            if (ordenId) {
                const detail = document.querySelector('.payment-result-detail');
                if (detail) {
                    detail.innerHTML = 'Orden #' + ordenId + ' — Esto puede tardar algunas horas. '
                        + 'Te notificaremos cuando se confirme.<br>Tu orden quedará reservada durante este tiempo.';
                }
            }
        })();
    </script>

</body>
</html>
